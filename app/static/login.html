<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsLet · Acceso</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Inter', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: min(90vw, 380px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h2 {
      font-size: 1rem;
      font-weight: 400;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1rem;
    }

    input[type="password"]:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129,140,248,0.2);
    }

    button {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      display: none;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: #fca5a5;
      font-size: 0.875rem;
      margin-top: 1rem;
    }

    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📰</div>
      <span class="logo-text">NewsLet</span>
    </div>
    <h2>Panel de administración</h2>

    <label for="pwd">Contraseña</label>
    <input type="password" id="pwd" placeholder="••••••••" autofocus>

    <button id="btn" onclick="doLogin()">Ingresar</button>
    <div class="error" id="err">Contraseña incorrecta. Inténtalo de nuevo.</div>
  </div>

  <script>
    // If already authenticated, redirect immediately
    if (localStorage.getItem('nl_token')) {
      window.location.replace('/');
    }

    document.getElementById('pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const pwd = document.getElementById('pwd').value.trim();
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      if (!pwd) return;

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      err.classList.remove('show');

      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd }),
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('nl_token', data.token);
          window.location.replace('/');
        } else {
          err.classList.add('show');
          document.getElementById('pwd').value = '';
          document.getElementById('pwd').focus();
        }
      } catch {
        err.textContent = 'Error de conexión. Verifica el servidor.';
        err.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    }
  </script>
</body>
</html>
