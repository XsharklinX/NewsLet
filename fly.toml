# Fly.io — NewsLet Pro
# Formato v2 (flyctl >= 0.1.x)

app            = "newslet-pro"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

# Volumen persistente para SQLite + logs
# Se crea con: flyctl volumes create newslet_data --region mia --size 1
[[mounts]]
  source      = "newslet_data"
  destination = "/app/data"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
