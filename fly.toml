app = "newslet-pro"
primary_region = "iad"

[build]

[env]
  PORT = "8000"
  APP_TIMEZONE = "America/Argentina/Buenos_Aires"

[[mounts]]
  source = "newslet_data"
  destination = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/api/v1/auth/status"
    port = 8000
    timeout = "10s"
    type = "http"
